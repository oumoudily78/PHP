<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Confirmation</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<h3>Voulez-vous supprimer ?</h3>

<button onclick="oui()">Oui</button>
<button onclick="non()">Non</button>

<script>
function oui() {
    alert("Vous avez confirmé la suppression !");
 
}

function non() {
    alert("Suppression annulée !");
}
</script>

</body>
</html>
